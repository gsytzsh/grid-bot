<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX 网格交易机器人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4aa;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
        }
        .status-indicator.running {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-start { background: #00d4aa; color: #1a1a2e; }
        .btn-start:hover { background: #00ff88; }
        .btn-stop { background: #ff4444; color: white; }
        .btn-stop:hover { background: #ff6666; }
        .btn-primary { background: #4a69bd; color: white; }
        .btn-primary:hover { background: #6a89cd; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #ff6b6b; }

        .panel {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .panel h2 {
            margin-bottom: 15px;
            color: #00d4aa;
            font-size: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #1f3460;
            padding: 20px;
            border-radius: 10px;
        }
        .card-label { color: #888; font-size: 12px; margin-bottom: 8px; }
        .card-value { font-size: 24px; font-weight: 600; }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #1f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #1f3460;
        }
        th { color: #888; font-weight: 500; }
        .positive { color: #00ff88; }
        .negative { color: #ff4444; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .config-warning {
            background: #ff9800;
            color: #000;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }

        .grid-card {
            background: #1f3460;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .grid-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .grid-card-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        .grid-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-active { background: #00d4aa; color: #1a1a2e; }
        .status-stopped { background: #666; color: #fff; }

        .price-preview {
            max-height: 200px;
            overflow-y: auto;
            background: #1a1a2e;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }
        .price-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid #1f3460;
        }
        .price-item.buy { color: #00ff88; }
        .price-item.sell { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 OKX 网格交易机器人</h1>

        <div id="configWarning" class="config-warning" style="display: none;">
            ⚠️ 尚未配置 OKX API，请在 config/.env 文件中配置
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div id="statusIndicator" class="status-indicator"></div>
                <span id="statusText">停止</span>
            </div>
            <div>
                <button class="btn btn-refresh" onclick="refreshData()">🔄 刷新</button>
                <button id="btnStart" class="btn btn-start" onclick="startBot()">▶️ 启动</button>
                <button id="btnStop" class="btn btn-stop" onclick="stopBot()" style="display: none;">⏹️ 停止</button>
                <button class="btn btn-primary" onclick="showCreateModal()">+ 创建网格</button>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-label">运行中网格</div>
                <div class="card-value" id="gridCount">0</div>
            </div>
            <div class="card">
                <div class="card-label">总利润 (USDT)</div>
                <div class="card-value" id="totalProfit">0</div>
            </div>
            <div class="card">
                <div class="card-label">状态</div>
                <div class="card-value" id="botStatus">未启动</div>
            </div>
        </div>

        <div class="panel">
            <h2>📊 我的网格</h2>
            <div id="gridsList">
                <div class="empty-state">暂无网格</div>
            </div>
        </div>

        <div class="panel">
            <h2>📈 热门交易对价格</h2>
            <table>
                <thead>
                    <tr>
                        <th>交易对</th>
                        <th>最新价</th>
                        <th>买一价</th>
                        <th>卖一价</th>
                    </tr>
                </thead>
                <tbody id="tickersTable">
                    <tr><td colspan="4" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 创建网格弹窗 -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>创建网格</h2>
                <button class="modal-close" onclick="closeCreateModal()">&times;</button>
            </div>
            <form id="createForm" onsubmit="createGrid(event)">
                <div class="form-group">
                    <label>交易对</label>
                    <select id="instId" required onchange="updatePricePreview()">
                        <option value="BTC-USDT">BTC-USDT</option>
                        <option value="ETH-USDT">ETH-USDT</option>
                        <option value="SOL-USDT">SOL-USDT</option>
                        <option value="XRP-USDT">XRP-USDT</option>
                        <option value="ADA-USDT">ADA-USDT</option>
                        <option value="DOGE-USDT">DOGE-USDT</option>
                        <option value="DOT-USDT">DOT-USDT</option>
                        <option value="AVAX-USDT">AVAX-USDT</option>
                        <option value="LINK-USDT">LINK-USDT</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>价格下限 (USDT)</label>
                        <input type="number" id="lowerPrice" step="0.01" required onchange="updatePricePreview()">
                    </div>
                    <div class="form-group">
                        <label>价格上限 (USDT)</label>
                        <input type="number" id="upperPrice" step="0.01" required onchange="updatePricePreview()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>网格数量</label>
                        <input type="number" id="gridNum" min="2" max="100" value="10" required onchange="updatePricePreview()">
                    </div>
                    <div class="form-group">
                        <label>投资金额 (USDT)</label>
                        <input type="number" id="investment" min="10" value="100" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>止损价 (可选)</label>
                        <input type="number" id="stopLoss" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>止盈价 (可选)</label>
                        <input type="number" id="takeProfit" step="0.01">
                    </div>
                </div>
                <div class="form-group">
                    <label>网格价格预览</label>
                    <div id="pricePreview" class="price-preview"></div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">创建网格</button>
            </form>
        </div>
    </div>

    <script>
        let isRunning = false;

        async function refreshData() {
            try {
                const statusRes = await fetch('/api/status');
                const status = await statusRes.json();
                updateStatus(status);

                const gridsRes = await fetch('/api/grids');
                const grids = await gridsRes.json();
                updateGridsList(grids);
                document.getElementById('gridCount').textContent = grids.length;

                if (status.total_profit) {
                    const profitEl = document.getElementById('totalProfit');
                    profitEl.textContent = parseFloat(status.total_profit).toFixed(2);
                    profitEl.className = 'card-value ' + (parseFloat(status.total_profit) >= 0 ? 'positive' : 'negative');
                }

                // 获取行情
                fetchTickers();

                // 检查配置
                if (!status.configured) {
                    document.getElementById('configWarning').style.display = 'block';
                }
            } catch (e) {
                console.error('刷新失败:', e);
            }
        }

        async function fetchTickers() {
            try {
                const res = await fetch('/api/tickers');
                if (!res.ok) {
                    document.getElementById('tickersTable').innerHTML = '<tr><td colspan="4" class="empty-state">需配置 API 后显示行情</td></tr>';
                    return;
                }
                const tickers = await res.json();
                const tbody = document.getElementById('tickersTable');
                tbody.innerHTML = Object.entries(tickers).map(([pair, data]) => `
                    <tr>
                        <td>${pair}</td>
                        <td>${data.last}</td>
                        <td class="positive">${data.bid}</td>
                        <td class="negative">${data.ask}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('获取行情失败:', e);
                document.getElementById('tickersTable').innerHTML = '<tr><td colspan="4" class="empty-state">需配置 API 后显示行情</td></tr>';
            }
        }

        function updateStatus(status) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const botStatus = document.getElementById('botStatus');

            if (status.running) {
                indicator.className = 'status-indicator running';
                statusText.textContent = '运行中';
                btnStart.style.display = 'none';
                btnStop.style.display = 'inline-block';
                botStatus.textContent = '运行中';
            } else {
                indicator.className = 'status-indicator stopped';
                statusText.textContent = '已停止';
                btnStart.style.display = 'inline-block';
                btnStop.style.display = 'none';
                botStatus.textContent = '已停止';
            }
        }

        function updateGridsList(grids) {
            const container = document.getElementById('gridsList');
            if (!grids || grids.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无网格</div>';
                return;
            }

            container.innerHTML = grids.map(g => `
                <div class="grid-card">
                    <div class="grid-card-header">
                        <div>
                            <strong>${g.inst_id}</strong>
                            <span class="grid-status status-${g.status}">${g.status}</span>
                        </div>
                        <div>
                            ${g.status === 'active' ? `
                                <button class="btn btn-danger" onclick="stopGrid('${g.grid_id}')" style="padding: 5px 10px; font-size: 12px;">停止</button>
                            ` : `
                                <button class="btn btn-primary" onclick="startGrid('${g.grid_id}')" style="padding: 5px 10px; font-size: 12px;">启动</button>
                                <button class="btn btn-danger" onclick="deleteGrid('${g.grid_id}')" style="padding: 5px 10px; font-size: 12px;">删除</button>
                            `}
                        </div>
                    </div>
                    <div class="grid-card-body">
                        <div>
                            <div class="card-label">利润</div>
                            <div class="${parseFloat(g.total_profit) >= 0 ? 'positive' : 'negative'}">
                                ${parseFloat(g.total_profit || 0).toFixed(2)} USDT
                            </div>
                        </div>
                        <div>
                            <div class="card-label">收益率</div>
                            <div class="${parseFloat(g.roi) >= 0 ? 'positive' : 'negative'}">
                                ${parseFloat(g.roi || 0).toFixed(2)}%
                            </div>
                        </div>
                        <div>
                            <div class="card-label">交易次数</div>
                            <div>${g.total_trades || 0}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showCreateModal() {
            document.getElementById('createModal').classList.add('show');
            updatePricePreview();
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('show');
        }

        async function updatePricePreview() {
            const lower = parseFloat(document.getElementById('lowerPrice').value) || 0;
            const upper = parseFloat(document.getElementById('upperPrice').value) || 0;
            const num = parseInt(document.getElementById('gridNum').value) || 10;

            if (lower <= 0 || upper <= 0 || lower >= upper || num <= 0) {
                document.getElementById('pricePreview').innerHTML = '<div style="color: #666;">请输入有效参数</div>';
                return;
            }

            try {
                const res = await fetch('/api/grids/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lower_price: lower, upper_price: upper, grid_num: num })
                });
                const data = await res.json();
                const container = document.getElementById('pricePreview');

                if (data.levels && data.levels.length > 0) {
                    container.innerHTML = data.levels.map(l => `
                        <div class="price-item ${l.type}">
                            <span>格 ${l.level}</span>
                            <span>${l.type === 'buy' ? '🟢 买入' : '🔴 卖出'}</span>
                            <span>$${l.price.toFixed(2)}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('预览失败:', e);
            }
        }

        async function createGrid(event) {
            event.preventDefault();

            const data = {
                inst_id: document.getElementById('instId').value,
                lower_price: parseFloat(document.getElementById('lowerPrice').value),
                upper_price: parseFloat(document.getElementById('upperPrice').value),
                grid_num: parseInt(document.getElementById('gridNum').value),
                investment_amount: parseFloat(document.getElementById('investment').value),
                stop_loss_price: parseFloat(document.getElementById('stopLoss').value) || null,
                take_profit_price: parseFloat(document.getElementById('takeProfit').value) || null
            };

            try {
                const res = await fetch('/api/grids/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    alert('网格创建成功！');
                    closeCreateModal();
                    refreshData();
                } else {
                    alert('创建失败：' + result.message);
                }
            } catch (e) {
                alert('创建失败：' + e.message);
            }
        }

        async function startGrid(gridId) {
            try {
                const res = await fetch(`/api/grids/${gridId}/start`, { method: 'POST' });
                const result = await res.json();
                if (result.success) {
                    alert('网格已启动');
                    refreshData();
                } else {
                    alert('启动失败：' + result.message);
                }
            } catch (e) {
                alert('启动失败：' + e.message);
            }
        }

        async function stopGrid(gridId) {
            try {
                const res = await fetch(`/api/grids/${gridId}/stop`, { method: 'POST' });
                const result = await res.json();
                if (result.success) {
                    alert('网格已停止');
                    refreshData();
                } else {
                    alert('停止失败：' + result.message);
                }
            } catch (e) {
                alert('停止失败：' + e.message);
            }
        }

        async function deleteGrid(gridId) {
            if (!confirm('确定要删除这个网格吗？')) return;

            try {
                const res = await fetch(`/api/grids/${gridId}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    alert('网格已删除');
                    refreshData();
                } else {
                    alert('删除失败：' + result.message);
                }
            } catch (e) {
                alert('删除失败：' + e.message);
            }
        }

        async function startBot() {
            try {
                await fetch('/api/start', { method: 'POST' });
                setTimeout(refreshData, 500);
            } catch (e) {
                alert('启动失败：' + e.message);
            }
        }

        async function stopBot() {
            try {
                await fetch('/api/stop', { method: 'POST' });
                setTimeout(refreshData, 500);
            } catch (e) {
                alert('停止失败：' + e.message);
            }
        }

        // 初始加载和定时刷新
        refreshData();
        setInterval(refreshData, 5000);  // 每 5 秒刷新
    </script>
</body>
</html>
